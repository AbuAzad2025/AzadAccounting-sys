name: ERP Audit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FLASK_APP: app.py
      SKIP_SYSTEM_INTEGRITY: "1"
      SECRET_KEY: ci-test-secret-key-not-for-production
      WTF_CSRF_ENABLED: "false"
      AI_SYSTEMS_ENABLED: "false"
      ENABLE_AUTOMATED_BACKUPS: "false"
      PAYMENT_ALLOCATION_ENABLED: "false"
      AUTO_CREATE_PERFORMANCE_INDEXES: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term --cov-report=xml

      - name: Upload coverage report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  audit:
    runs-on: ubuntu-latest
    needs: test
    env:
      FLASK_APP: app.py
      SKIP_SYSTEM_INTEGRITY: "0"
      DATABASE_URL: sqlite:////tmp/azad_ci_garage.db
      SECRET_KEY: ci-audit-secret-key-not-for-production
      WTF_CSRF_ENABLED: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Database create
        run: python -m flask shell -c "from extensions import db; db.create_all(); print('OK: all tables created')"

      - name: Comprehensive audit
        run: python -m flask comprehensive-audit

      - name: Integration audit
        run: python -m flask integration-audit

      - name: ERP readiness
        run: python -m flask erp-readiness

      - name: Balance integrity sample
        run: python -m flask audit-integrity --scope balances --limit 30
