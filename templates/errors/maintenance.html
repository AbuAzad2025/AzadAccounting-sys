<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>صيانة النظام</title>
<style>
  :root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--fg:#e5e7eb;--accent:#3b82f6;--warning:#f59e0b}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%,#1f2937 0,transparent 60%),linear-gradient(180deg,#0b1220 0,#0b1220 40%,#0a0f1c 100%),var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Noto Sans",Tahoma,Arial}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:32px}
  .card{width:100%;max-width:720px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:20px;backdrop-filter:blur(6px);padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.35);text-align:center}
  .icon{font-size:64px;margin-bottom:20px;display:block}
  .title{margin:.35rem 0 0;font-size:28px;font-weight:700}
  .desc{margin:14px 0 22px;color:var(--muted);line-height:1.8}
  .hint{font-size:13px;color:#9ca3af;margin:10px 0 26px}
  .row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn{appearance:none;border:0;border-radius:12px;padding:12px 24px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:10px;cursor:pointer;transition:transform .08s ease,opacity .2s ease;user-select:none}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-ghost{background:transparent;color:var(--fg);border:1px solid rgba(255,255,255,.12)}
  .mono{font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace}
  .footer{margin-top:22px;font-size:12px;color:#7c8799}
  .maintenance{background:rgba(59, 130, 246, 0.1);border:1px solid rgba(59, 130, 246, 0.2);border-radius:12px;padding:16px;margin:16px 0;color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <main class="card" role="main" aria-labelledby="err-title">
    <div class="icon">🛠️</div>
    <h1 id="err-title" class="title">النظام تحت الصيانة</h1>
    <p class="desc">نقوم حالياً بإجراء تحديثات وتحسينات هامة على النظام لضمان أفضل أداء.</p>
    
    <div class="maintenance">
      <strong>⚠️ تنبيه:</strong> يرجى عدم محاولة إجراء عمليات حساسة حالياً.
    </div>
    
    <p class="hint mono">سنعود للعمل خلال وقت قصير.</p>
    <div class="row">
      <button class="btn btn-primary" type="button" onclick="location.reload()">تحديث الصفحة</button>
      <a class="btn btn-ghost" href="https://wa.me/970562150193" target="_blank">الدعم الفني</a>
    </div>
    <div class="footer">
      Garage Manager &copy; 2026
    </div>
  </main>
</div>
<script>
// إعادة تحميل تلقائية بعد دقيقة
setTimeout(() => location.reload(), 60000);
</script>
</body>
</html>
