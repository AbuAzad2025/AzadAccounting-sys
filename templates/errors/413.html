<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>413 · حجم الملف كبير</title>
<style>
  :root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--fg:#e5e7eb;--accent:#e11d48}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:radial-gradient(1100px 520px at 10% -20%,#1e293b 0,transparent 60%),linear-gradient(180deg,#0b1220 0,#0b1220 40%,#0a0f1c 100%),var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Noto Sans",Tahoma,Arial}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:32px}
  .card{width:100%;max-width:720px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:20px;backdrop-filter:blur(6px);padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .code{font-size:56px;line-height:1;margin:0;color:var(--accent);letter-spacing:2px;font-weight:800}
  .title{margin:.35rem 0 0;font-size:28px;font-weight:700}
  .desc{margin:14px 0 22px;color:var(--muted);line-height:1.8}
  .hint{font-size:13px;color:#9ca3af;margin:10px 0 26px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .btn{appearance:none;border:0;border-radius:12px;padding:12px 16px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:10px;cursor:pointer;transition:transform .08s ease,opacity .2s ease;user-select:none}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-ghost{background:transparent;color:var(--fg);border:1px solid rgba(255,255,255,.12)}
  .mono{font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",Menlo,monospace}
  .footer{margin-top:22px;font-size:12px;color:#7c8799}
</style>
</head>
<body>
<div class="wrap">
  <main class="card" role="main" aria-labelledby="err-title">
    <div class="code" aria-hidden="true">413</div>
    <h1 id="err-title" class="title">حجم الملف كبير جداً</h1>
    <p class="desc">الملف الذي تحاول رفعه يتجاوز الحد المسموح به في الخادم.</p>
    
    <div style="background:rgba(225,29,72,.1);border:1px solid rgba(225,29,72,.2);border-radius:12px;padding:16px;margin:16px 0;">
      <strong>💡 نصائح:</strong>
      <ul style="margin:8px 0 0;padding-right:20px;color:#9ca3af;">
        <li>حاول ضغط الملف قبل الرفع.</li>
        <li>الحد الأقصى المسموح به عادة هو 16MB.</li>
        <li>إذا كنت ترفع صوراً، حاول تقليل دقتها.</li>
      </ul>
    </div>
    
    <div class="row">
      <a class="btn btn-primary" href="{{ url_for('main.dashboard') }}">العودة للرئيسية</a>
      <button class="btn btn-ghost" type="button" onclick="history.back()">محاولة مرة أخرى</button>
    </div>
    <div class="footer">
      <strong>للدعم:</strong> تواصل مع مسؤول النظام لزيادة الحد المسموح.
    </div>
  </main>
</div>
</body>
</html>
