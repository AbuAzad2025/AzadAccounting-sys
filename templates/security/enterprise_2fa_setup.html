{% extends 'base.html' %}
{% block title %}المصادقة الثنائية{% endblock %}
{% block content %}
<div class="container py-3" dir="rtl">
  <h4>إعداد المصادقة الثنائية (2FA)</h4>
  {% if enabled %}<div class="alert alert-success">مفعّل</div>{% endif %}
  <p>السر: <code>{{ secret }}</code></p>
  <p class="text-muted">رمز تجريبي الآن: {{ current_code }}</p>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group"><label>أدخل الرمز من تطبيق المصادقة</label><input name="code" class="form-control" maxlength="6"></div>
    <button class="btn btn-primary">تفعيل</button>
  </form>
  {% if enabled %}
  <form method="post" action="{{ url_for('enterprise_security_bp.disable_2fa') }}" class="mt-3">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input name="code" class="form-control mb-2" placeholder="رمز للإيقاف">
    <button class="btn btn-outline-danger">إيقاف 2FA</button>
  </form>
  {% endif %}
</div>
{% endblock %}
