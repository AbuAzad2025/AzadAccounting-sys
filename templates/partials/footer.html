<footer class="main-footer erp-footer" dir="rtl" id="erpAppFooter">
  <div class="erp-footer__inner">
    <div class="erp-footer__brand-row">
      <img
        class="erp-footer__azad-logo"
        src="{{ system_settings.platform_logo_url or url_for('static', filename='img/branding/platform/logos/primary.png') }}"
        alt="{{ system_settings.platform_company_name or 'شركة أزاد للأنظمة الذكية' }}"
        loading="lazy"
        decoding="async"
        onerror="this.hidden=true">
      <span class="erp-footer__azad-name">{{ system_settings.platform_company_name or 'شركة أزاد للأنظمة الذكية' }}</span>
    </div>

    <div class="erp-footer__dev" aria-label="معلومات المطوّر">
      <span class="erp-footer__dev-text">
        تصميم وتطوير المهندس: <strong>أحمد غنام (أبو آزاد)</strong>
      </span>
      <span class="erp-footer__dev-actions">
        <a href="tel:+972562150193" class="erp-footer__contact" title="اتصال">
          <i class="fas fa-phone" aria-hidden="true"></i>
          <span dir="ltr">+972 56 215 0193</span>
        </a>
        <a href="https://wa.me/972562150193" class="erp-footer__contact erp-footer__contact--wa" target="_blank" rel="noopener noreferrer" title="واتساب">
          <i class="fab fa-whatsapp" aria-hidden="true"></i>
          <span>واتساب</span>
        </a>
      </span>
    </div>

    <div class="erp-footer__meta">
      <span><i class="fas fa-copyright" aria-hidden="true"></i> {{ system_settings.platform_company_name or 'شركة أزاد للأنظمة الذكية' }} — جميع الحقوق محفوظة</span>
      <span class="erp-footer__version">v3.2.0</span>
    </div>
  </div>
</footer>
