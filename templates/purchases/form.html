{% extends 'base.html' %}
{% block title %}أمر شراء{% endblock %}
{% block content %}
<div class="container py-3" dir="rtl">
  <h4>أمر شراء جديد</h4>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row">
      <div class="col-md-4 form-group"><label>المورد</label>
        <select name="supplier_id" class="form-control" required>{% for s in suppliers %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}</select>
      </div>
      <div class="col-md-4 form-group"><label>الفرع</label>
        <select name="branch_id" class="form-control" required>{% for b in branches %}<option value="{{ b.id }}">{{ b.name }}</option>{% endfor %}</select>
      </div>
      <div class="col-md-4 form-group"><label>تاريخ</label><input type="date" name="order_date" class="form-control"></div>
    </div>
    <h5 class="mt-3">البنود</h5>
    <div id="lines">
      <div class="row mb-2 line-row">
        <div class="col-5"><select name="product_id" class="form-control">{% for p in products %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}</select></div>
        <div class="col-2"><input name="quantity" class="form-control" placeholder="كمية" value="1"></div>
        <div class="col-2"><input name="unit_price" class="form-control" placeholder="سعر" value="0"></div>
      </div>
    </div>
    <button type="submit" class="btn btn-primary mt-2">حفظ</button>
  </form>
</div>
{% endblock %}
