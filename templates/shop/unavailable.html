{% extends "shop/base.html" %}

{% block title %}المتجر غير متاح{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-5 text-center">
            <div class="mb-4">
              <i class="fas fa-store-slash fa-4x text-muted"></i>
            </div>
            <h2 class="fw-bold mb-2">المتجر غير متاح حالياً</h2>
            <p class="text-muted mb-4">نعمل على تجهيز العروض والمنتجات. يمكنك التواصل معنا مباشرة لإتمام الطلب.</p>
            <div class="d-flex justify-content-center gap-2 flex-wrap">
              <a class="btn btn-success btn-lg" href="https://wa.me/{{ (shop_settings.whatsapp_phone or '972599999999')|replace('+','')|replace(' ','') }}" target="_blank" rel="noopener">
                <i class="fab fa-whatsapp me-2"></i> تواصل عبر واتساب
              </a>
              <a class="btn btn-outline-secondary btn-lg" href="{{ url_for('main.dashboard') }}">
                <i class="fas fa-home me-2"></i> العودة للرئيسية
              </a>
            </div>
            <div class="mt-4 small text-muted" dir="ltr">
              WhatsApp: {{ shop_settings.whatsapp_phone or '—' }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
